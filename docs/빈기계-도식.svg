<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gUser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gShell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#e9eef5"/>
    </linearGradient>
    <linearGradient id="gArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#64748b"/><stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="820" height="400" fill="url(#gBg)"/>
  <text x="410" y="44" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b" letter-spacing="0.5">AI Mechanical Turk</text>
  <line x1="340" y1="56" x2="480" y2="56" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== 사용자 (사람) ===== -->
  <g filter="url(#shadow)"><rect x="35" y="120" width="150" height="155" rx="18" fill="url(#gUser)"/></g>
  <g>
    <circle cx="110" cy="165" r="14" fill="#ffffff"/>
    <circle cx="104" cy="163" r="1.8" fill="#1e3a8a"/>
    <circle cx="116" cy="163" r="1.8" fill="#1e3a8a"/>
    <path d="M103,170 Q110,176 117,170" stroke="#1e3a8a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M84,212 Q84,188 110,188 Q136,188 136,212 Z" fill="#ffffff"/>
  </g>
  <text x="110" y="262" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">사용자</text>

  <!-- ===== 빈기계 (속빈 캐비닛) ===== -->
  <g filter="url(#shadow)"><rect x="335" y="120" width="150" height="155" rx="18" fill="url(#gShell)"/></g>
  <g>
    <!-- 상판 -->
    <rect x="372" y="150" width="76" height="7" rx="2" fill="#ffffff"/>
    <!-- 본체 -->
    <rect x="378" y="158" width="64" height="62" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <!-- 빈 내부 -->
    <rect x="385" y="165" width="50" height="48" rx="2" fill="#0f172a" opacity="0.6"/>
    <!-- 열린 문 (왼쪽으로 열림) -->
    <path d="M378,165 L356,158 L356,220 L378,214 Z" fill="#ffffff" opacity="0.92" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="372" cy="190" r="2.2" fill="#ffffff"/>
    <!-- 다리 -->
    <line x1="385" y1="220" x2="385" y2="228" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="435" y1="220" x2="435" y2="228" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="410" y="262" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">빈기계</text>

  <!-- ===== 인공지능 (로봇 머리) ===== -->
  <g filter="url(#shadow)"><rect x="635" y="120" width="150" height="155" rx="18" fill="url(#gAI)"/></g>
  <g>
    <!-- 안테나 -->
    <circle cx="710" cy="137" r="3" fill="#ffffff"/>
    <line x1="710" y1="140" x2="710" y2="152" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 머리 -->
    <rect x="686" y="152" width="48" height="46" rx="9" fill="#ffffff"/>
    <!-- 귀 -->
    <rect x="682" y="166" width="5" height="14" rx="2" fill="#ffffff"/>
    <rect x="733" y="166" width="5" height="14" rx="2" fill="#ffffff"/>
    <!-- 눈 -->
    <circle cx="700" cy="170" r="4.5" fill="#6d28d9"/>
    <circle cx="720" cy="170" r="4.5" fill="#6d28d9"/>
    <!-- 입 그릴 -->
    <rect x="702" y="184" width="16" height="4" rx="1.5" fill="#6d28d9"/>
    <!-- 목 -->
    <rect x="703" y="198" width="14" height="7" rx="2" fill="#ffffff"/>
  </g>
  <text x="710" y="262" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">인공지능</text>

  <!-- ===== Arrows ===== -->
  <path d="M185,160 Q260,112 335,160" fill="none" stroke="url(#gArrow)" stroke-width="2.6" marker-end="url(#ah)"/>
  <path d="M485,160 Q560,112 635,160" fill="none" stroke="url(#gArrow)" stroke-width="2.6" marker-end="url(#ah)"/>
  <path d="M635,235 Q560,285 485,235" fill="none" stroke="url(#gArrow)" stroke-width="2.6" marker-end="url(#ah)"/>
  <path d="M335,235 Q260,285 185,235" fill="none" stroke="url(#gArrow)" stroke-width="2.6" marker-end="url(#ah)"/>

  <g font-size="15" font-weight="700" fill="#334155">
    <g><rect x="237" y="82" width="46" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/><text x="260" y="98" text-anchor="middle">조작</text></g>
    <g><rect x="537" y="82" width="46" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/><text x="560" y="98" text-anchor="middle">입력</text></g>
    <g><rect x="537" y="292" width="46" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/><text x="560" y="308" text-anchor="middle">조작</text></g>
    <g><rect x="237" y="292" width="46" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/><text x="260" y="308" text-anchor="middle">응답</text></g>
  </g>
</svg>